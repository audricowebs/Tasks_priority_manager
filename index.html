<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Priority Manager</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <div class="container">

    <!-- HEADER -->
    <header class="header">
      <h1>📌 Task Priority Manager</h1>
      <p class="subtitle">Atur tugasmu dengan lebih rapi dan terprioritas</p>
    </header>

    <section class="form-box">
      <h3>Tambah Tugas</h3>

      <div class="form-group">
        <label>Judul Tugas</label>
        <input type="text" id="taskInput" placeholder="Contoh: Belajar JavaScript">
      </div>

      <div class="form-group">
        <label>Deskripsi</label>
        <textarea id="descInput" placeholder="Contoh: Praktik function" rows="3"></textarea>
      </div>

      <div class="form-group">
        <label>Prioritas</label>
        <select id="priorityInput">
          <option value="tinggi"> Tinggi</option>
          <option value="sedang"> Sedang</option>
          <option value="rendah"> Rendah</option>
        </select>
      </div>

      <div class="form-group">
        <label>Deadline</label>
        <input type="date" id="deadlineInput">
      </div>

      <button id="addBtn">+ Tambah Tugas</button>
    </section>

    <section class="filter-box">
      <h3>Filter</h3>
      <div class="filters">
        <button onclick="renderTasks()">Semua</button>
        <button onclick="filterTask('tinggi')">Tinggi</button>
        <button onclick="filterTask('sedang')">Sedang</button>
        <button onclick="filterTask('rendah')">Rendah</button>
      </div>
    </section>

    <section class="task-box">
      <h3>Daftar Tugas</h3>
      <ul id="taskList"></ul>
    </section>

  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© 2026 - Task Priority Manager - PPLG X-3</p>
  </footer>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
