<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testimoni - Task Priority Manager</title>
    <link rel="stylesheet" href="../CSS/testimony.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">Task Priority Manager</div>
    <ul class="nav-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="testimony.html">Testimoni</a></li>
        <li><a href="us.html">About Us</a></li>
        <li><a href="../HTML/home.html" class="btn-nav">Mulai</a></li>
    </ul>
</nav>

<main class="container">
    <header class="header-section">
        <h1>Apa yang pengguna katakan...</h1>
        <p class="view-more">LIHAT TESTIMONI LAINNYA</p>
    </header>

    <section class="form-container glass-card">
        <h3>Tulis Pengalaman Anda</h3>
        <div class="form-grid">
            <div class="input-group">
                <label>Nama Lengkap</label>
                <input type="text" id="userName" placeholder="Contoh: Kariim F.">
            </div>
            <div class="input-group">
                <label>Rating (1-5)</label>
                <input type="number" id="userRating" min="1" max="5" placeholder="5">
            </div>
        </div>
        <div class="input-group">
            <label>Pesan Testimoni</label>
            <textarea id="userFeedback" rows="3" placeholder="Bagaimana layanan kami menurut Anda?"></textarea>
        </div>
        <button id="submitBtn" class="btn-submit">Kirim Testimoni Sekarang</button>
    </section>

    <div id="testimonialGrid" class="testimonial-grid">
    </div>
</main>

<script src="../JS/testimony.js"></script>
</body>
</html>
